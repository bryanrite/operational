name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} / ${{ matrix.gemfile }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        ruby:
          - 3.0
          - 3.1
          - 3.2
          - 3.3
          - 3.4
        gemfile:
          - rails-7.0
          - rails-7.1
          - rails-7.2
          - rails-8.0
        exclude:
          - ruby: 3.0
            gemfile: rails-7.2
          - ruby: 3.0
            gemfile: rails-8.0
          - ruby: 3.1
            gemfile: rails-8.0
    runs-on: ${{ matrix.os }}
    env:
      BUNDLE_GEMFILE: gemfiles/${{ matrix.gemfile }}.gemfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ${{ matrix.ruby }}
      - name: Run tests
        run: bundle exec rake spec
